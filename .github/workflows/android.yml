name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:   # 👈 ye add karo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build APK
      run: |
        cd jnotes-android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: jnotes-android/app/build/outputs/apk/debug/app-debug.apk
