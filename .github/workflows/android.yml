name: Build APKs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 🔥 USER APP BUILD
      - name: Build User APK
        run: |
          cd jnotes-android
          chmod +x gradlew
          ./gradlew clean assembleDebug

      # 🔥 ADMIN APP BUILD
      - name: Build Admin APK
        run: |
          cd jnotes-admin
          chmod +x gradlew
          ./gradlew clean assembleDebug

      # 📦 Upload USER APK (FIXED PATH)
      - name: Upload User APK
        uses: actions/upload-artifact@v4
        with:
          name: user-app
          path: jnotes-android/app/build/outputs/apk/debug/app-debug.apk

      # 📦 Upload ADMIN APK (FIXED PATH)
      - name: Upload Admin APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-app
          path: jnotes-admin/app/build/outputs/apk/debug/app-debug.apk
